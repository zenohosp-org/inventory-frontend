name: Deploy frontend to VPS
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Build and deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /opt/zenohosp/inventory-frontend
            git pull origin main
            npm ci
            npm run build
            rm -rf /var/www/inventory/*
            cp -r dist/* /var/www/inventory/
